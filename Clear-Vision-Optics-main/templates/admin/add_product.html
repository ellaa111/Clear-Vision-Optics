{% extends 'base.html' %}
{% block content %}

<section class="py-8 bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4">
    <div class="max-w-4xl mx-auto">
      <!-- Header -->
      <div class="bg-white rounded-xl shadow-md p-6 mb-6">
        <div class="flex justify-between items-center">
          <div>
            <h1 class="text-2xl font-bold text-navy">➕ Add New Product</h1>
            <p class="text-gray-600">Fill in the details below</p>
          </div>
          <a href="/admin/dashboard" 
             class="text-turquoise hover:text-navy font-medium flex items-center">
            ← Back to Dashboard
          </a>
        </div>
      </div>
      
      <!-- Form -->
      <div class="bg-white rounded-xl shadow-md p-8">
        <form method="POST" 
              enctype="multipart/form-data" 
              class="space-y-6">
          
          <!-- Product Name & Category -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-gray-700 mb-2">Product Name *</label>
              <input type="text" 
                     name="name" 
                     required 
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-turquoise">
            </div>
            <div>
              <label class="block text-gray-700 mb-2">Category *</label>
              <input type="text" 
                     name="category" 
                     required 
                     placeholder="glasses, lenses, accessories"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-turquoise">
            </div>
          </div>
          
          <!-- Description -->
          <div>
            <label class="block text-gray-700 mb-2">Description *</label>
            <textarea name="description" 
                      required 
                      rows="3" 
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-turquoise"></textarea>
          </div>
          
          <!-- Features -->
          <div>
            <label class="block text-gray-700 mb-2">
              Features (one per line)
            </label>
            <textarea name="features" 
                      rows="4" 
                      placeholder="Anti-scratch coating&#10;100% UV protection&#10;Lightweight design"
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-turquoise"></textarea>
            <p class="text-sm text-gray-500 mt-1">
              Press Enter for each new feature
            </p>
          </div>
          
          <!-- Price -->
          <div>
            <label class="block text-gray-700 mb-2">Price (KSH) *</label>
            <input type="number" 
                   step="0.01" 
                   name="price" 
                   required 
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-turquoise">
          </div>
          
          <!-- Image Upload -->
          <div>
            <label class="block text-gray-700 mb-2">Product Image</label>
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-turquoise transition">
              <input type="file" 
                     name="image" 
                     id="imageUpload" 
                     accept="image/*" 
                     class="hidden">
              <label for="imageUpload" 
                     class="cursor-pointer">
                <div class="text-5xl mb-3">🖼️</div>
                <p class="text-gray-600 mb-2">
                  <span class="text-turquoise font-medium">Click to upload</span> or drag and drop
                </p>
                <p class="text-sm text-gray-500">
                  PNG, JPG, GIF up to 5MB
                </p>
              </label>
            </div>
          </div>
          
          <!-- Featured Checkbox -->
          <div class="flex items-center">
            <input type="checkbox" 
                   name="is_featured" 
                   id="is_featured" 
                   class="w-5 h-5 text-turquoise rounded focus:ring-turquoise">
            <label for="is_featured" class="ml-2 text-gray-700">
              Mark as Featured Product (shows on homepage)
            </label>
          </div>
          
          <!-- Submit Button -->
          <div class="pt-6 border-t">
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-turquoise to-[#0096c7] text-white font-bold py-4 rounded-xl hover:from-[#0096c7] hover:to-navy transition-all duration-300 shadow-lg text-lg">
              ✅ Add Product
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

{% endblock %}
