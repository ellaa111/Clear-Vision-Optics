{% extends 'base.html' %}
{% block content %}

<section class="min-h-screen bg-gradient-to-br from-navy to-[#0d3b66] flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <img src="{{ url_for('static', filename='images/logo.png') }}" 
           alt="Clear Vision Optics" 
           class="h-16 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-navy">Admin Login</h1>
      <p class="text-gray-600">Access your dashboard</p>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-6 p-4 rounded-lg bg-red-50 text-red-800 border border-red-200">
          {{ messages[0][1] }}
        </div>
      {% endif %}
    {% endwith %}
    
    <form method="POST" class="space-y-6">
      <div>
        <label class="block text-gray-700 mb-2">Admin Password</label>
        <input type="password" 
               name="password" 
               required 
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-turquoise focus:border-transparent">
      </div>
      
      <button type="submit" 
              class="w-full bg-gradient-to-r from-turquoise to-[#0096c7] text-white font-bold py-3 rounded-lg hover:from-[#0096c7] hover:to-navy transition-all duration-300 shadow-lg">
        Login
      </button>
    </form>
    
    <div class="mt-6 pt-6 border-t border-gray-200 text-center">
      <p class="text-sm text-gray-600">
        <a href="/" class="text-turquoise hover:text-navy font-medium">
          ← Back to Website
        </a>
      </p>
    </div>
  </div>
</section>

{% endblock %}
