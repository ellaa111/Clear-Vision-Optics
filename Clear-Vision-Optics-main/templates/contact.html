{% extends 'base.html' %}

{% block content %}
<section class="py-16 bg-gray-50">
    <div class="container mx-auto px-4">
        <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
            <div class="grid grid-cols-1 md:grid-cols-2">
                <div class="p-8 bg-navy text-white">
                    <h2 class="text-2xl font-bold mb-6">Contact Us</h2>
                    <div class="mb-6">
                        <h3 class="text-xl font-semibold mb-2">Visit Our Store</h3>
                        <p>Migori, Kehancha Town</p>
                    </div>
                    <div class="mb-6">
                        <h3 class="text-xl font-semibold mb-2">Call Us</h3>
                        <p>+254 704 084 499</p>
                        <p>+254 725 884 252</p>
                    </div>
                    <div>
                        <h3 class="text-xl font-semibold mb-2">Email</h3>
                        <p>mohaa249@gmail.com</p>
                    </div>
                </div>
                <div class="p-8">
                    <form class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2">Name</label>
                            <input type="text" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-turquoise">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">Email</label>
                            <input type="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-turquoise">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">Message</label>
                            <textarea class="w-full px-4 py-2 border rounded-lg h-32 focus:outline-none focus:ring-2 focus:ring-turquoise"></textarea>
                        </div>
                        <button type="submit" 
                                class="w-full bg-turquoise text-white py-3 rounded-lg font-bold hover:bg-navy transition">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
